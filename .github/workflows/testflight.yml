name: Deploy to TestFlight

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create API Key file
        run: |
          cat > fastlane/api_key.json << EOF
          {
            "key_id": "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}",
            "issuer_id": "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}",
            "key": "${{ secrets.APP_STORE_CONNECT_API_KEY }}",
            "in_house": false
          }
          EOF

      - name: Create Config.plist
        run: |
          cat > Syndicore/Resources/Config.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>supabase_url</key>
              <string>${{ secrets.SUPABASE_URL }}</string>
              <key>SUPABASE_ANON_KEY</key>
              <string>${{ secrets.SUPABASE_ANON_KEY }}</string>
              <key>API_BASE_URL</key>
              <string>${{ secrets.API_BASE_URL }}</string>
          </dict>
          </plist>
          EOF

      - name: Run Fastlane beta
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          export MATCH_GIT_BASIC_AUTHORIZATION=$(echo -n "LukovicNikola:$GH_PAT" | base64)
          fastlane beta
